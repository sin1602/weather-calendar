name: Update Weather ICS

# 1. 전역 환경 변수 (모든 단계에 적용)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 경고 해결

on:
  schedule:
    # 기상청 발표 15분 뒤 실행 (KST 02:15, 05:15 ... 23:15)
    - cron: '15 17,20,23,2,5,8,11,14 * * *'
  push:
    paths:
      - 'update_calendar.py'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz icalendar

      - name: Run update script
        # 2. 지역 환경 변수 (해당 단계의 파이썬 실행에만 적용)
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          TZ: Asia/Seoul
        run: python update_calendar.py

      - name: Commit and Push changes
        run: |
          KST_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add weather.ics
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update weather.ics [$KST_TIME KST]"
            git push
          else
            echo "No changes to commit"
          fi

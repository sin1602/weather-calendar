name: Update Weather ICS

on:
  schedule:
    - cron: '0 0,6,12,18 * * *' # 하루 4번 자동 실행 (한국시간 9시, 15시, 21시, 03시)
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install requests icalendar pytz
          
      - name: Run Update Script
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
        run: python update_calendar.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add weather.ics
          git commit -m "Update weather calendar" || echo "No changes to commit"
          git push
